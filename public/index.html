<!DOCTYPE html>
<html>
<head>
    <title>Himachal Tourism</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Inline styles for reviews and submit review form */
        #reviewsContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        .review-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            background: #f9f9f9;
            width: 300px;
        }
        .review-card h3 {
            margin: 0 0 5px 0;
        }
        .stars {
            color: gold;
        }
        #submitReviewSection form {
            max-width: 400px;
            margin: 20px auto;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f1f1f1;
        }
        #submitReviewSection form input,
        #submitReviewSection form textarea,
        #submitReviewSection form button {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        #submitReviewSection form button {
            background: #2a5d84;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Explore Himachal Pradesh</h1>
    <nav>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="contact.html">Contact</a>
        <a href="payment.html">Payment</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<section class="hero">
    <h2 class="fade" style="color: #ff5733;">Discover the Beauty of Mountains</h2>
</section>

<div class="gallery">

    <a href="manali.html" class="card">
        <img src="images/manali.jpg" class="place-img" alt="Manali">

    </a>

    <a href="shimla.html" class="card">
        <img src="images/shimla.jpg" class="place-img" alt="Shimla">
        <h3>Shimla</h3>
    </a>

    <a href="kasol.html" class="card">
        <img src="images/kasol.jpg" class="place-img" alt="Kasol">
        <h3>Kasol</h3>
    </a>

    <a href="chitkul.html" class="card">
        <img src="images/chitkul.jpg" class="place-img" alt="Chitkul">
        <h3>Chitkul</h3>
    </a>

    <a href="spiti.html" class="card">
        <img src="images/spiti.jpg" class="place-img" alt="Spiti Valley">
        <h3>Spiti</h3>
    </a>

    <a href="chamba.html" class="card">
        <img src="images/chamba.jpg" class="place-img" alt="Chamba">
        <h3>Chamba</h3>
    </a>

    <a href="dharamshala.html" class="card">
        <img src="images/dharamshala.jpg" class="place-img" alt="Dharamshala">
        <h3>Dharamshala</h3>
    </a>

    <a href="kullu.html" class="card">
        <img src="images/kullu.jpg" class="place-img" alt="Kullu">
        <h3>Kullu</h3>
    </a>

    <a href="rohru.html" class="card">
        <img src="images/rohru.jpg" class="place-img" alt="Rohru">
        <h3>Rohru</h3>
    </a>

    <a href="triund.html" class="card">
        <img src="images/triund.jpg" class="place-img" alt="Triund">
        <h3>Triund</h3>
    </a>

</div>

<!-- ===== Watermark ===== -->
<div class="watermark">© CV</div>
</div>

<!-- Submit Review Section -->
<section id="submitReviewSection">
    <h2 style="text-align:center;">Submit Your Review</h2>
    <form id="reviewForm">
        <input type="text" name="place" placeholder="Place" required>
        <input type="number" name="rating" placeholder="Rating (1-5)" min="1" max="5" required>
        <textarea name="review" placeholder="Your review" required></textarea>
        <button type="submit">Submit Review</button>
    </form>
</section>


<!-- Reviews Display -->
<section id="reviewsSection">
    <h2 style="text-align:center;">Visitor Reviews</h2>
    <div id="reviewsContainer" class="reviews-gallery">Loading reviews...</div>
</section>
<style>
    /* Reviews Gallery Styling */
    .reviews-gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        margin: 20px 0;
    }
    .review-card {
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        width: 300px;
        background: #fff;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
    }
    .review-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }
    .review-content {
        padding: 15px;
    }
    .review-content h3 {
        margin: 0 0 5px 0;
        font-size: 1.1em;
        color: #2a5d84;
    }
    .stars {
        color: gold;
        margin-bottom: 10px;
    }
    .review-content p {
        margin: 0;
        font-size: 0.95em;
    }
    #submitReviewSection form {
        max-width: 400px;
        margin: 20px auto;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background: #f1f1f1;
    }
    #submitReviewSection form input,
    #submitReviewSection form textarea,
    #submitReviewSection form button {
        width: 100%;
        margin: 10px 0;
        padding: 8px;
    }
    #submitReviewSection form button {
        background: #2a5d84;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }
</style>

<script>
    const BASE_URL = window.location.hostname.includes("localhost")
        ? "http://localhost:3000"
        : "https://webs-1-aya0.onrender.com";

    // Map place names to images
    const placeImages = {
        "Manali": "images/manali.jpg",
        "Shimla": "images/shimla.jpg",
        "Kasol": "images/kasol.jpg",
        "Chitkul": "images/chitkul.jpg",
        "Spiti": "images/spiti.jpg",
        "Chamba": "images/chamba.jpg",
        "Dharamshala": "images/dharamshala.jpg",
        "Kullu": "images/kullu.jpg",
        "Rohru": "images/rohru.jpg",
        "Triund": "images/triund.jpg"
    };

    // ------------------- Forms Submission -------------------
    async function submitForm(formId, endpoint, callback) {
        const form = document.getElementById(formId);
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(form));
            try {
                const res = await fetch(`${BASE_URL}/${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                alert(await res.text());
                form.reset();
                if(callback) callback(); // refresh reviews if needed
            } catch(err) {
                console.error(err);
                alert(`Error submitting ${formId}`);
            }
        });
    }

    submitForm("reviewForm", "review", fetchReviews);

    // ------------------- Fetch Reviews -------------------
     async function fetchReviews() {
        try {
            const res = await fetch(`${BASE_URL}/admin/reviews`);
            const reviews = await res.json();
            const container = document.getElementById("reviewsContainer");

            if (reviews.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>No reviews yet.</p>";
                return;
            }

            container.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <img src="${placeImages[r.place] || 'images/default.jpg'}" alt="${r.place}">
                    <div class="review-content">
                        <h3>${r.place}</h3>
                        <div class="stars">${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}</div>
                        <p>${r.review}</p>
                    </div>
                </div>
            `).join("");

        } catch(err) {
            console.error(err);
            document.getElementById("reviewsContainer").innerHTML = "<p style='text-align:center;'>Error loading reviews.</p>";
        }
    }

    fetchReviews();

    // ------------------- Submit Review Form -------------------
    const reviewForm = document.getElementById("reviewForm");
    reviewForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(reviewForm));
        try {
            const res = await fetch(`${BASE_URL}/review`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            const msg = await res.text();
            alert(msg);
            reviewForm.reset();
            fetchReviews(); // Refresh gallery immediately
        } catch(err) {
            console.error(err);
            alert("Error submitting review.");
        }
    });
    
</script>

</body>
</html>
