<!DOCTYPE html>
<html>
<head>
    <title>Contact Us - Himachal Tourism</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #e0f7fa, #ffffff);
            margin: 0;
            padding: 0;
        }

        header {
            background: #2a5d84;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2a5d84;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .input-container i {
            position: absolute;
            top: 12px;
            left: 10px;
            color: #2a5d84;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 12px 12px 35px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        select {
            padding-left: 35px;
        }

        small {
            display: block;
            color: #555;
            font-size: 0.9em;
            margin-top: 3px;
        }

        button {
            background: #2a5d84;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1f4668;
        }

        .success, .error {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

    </style>
</head>
<body>

<header>
    <h1>Himachal Tourism</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="booking.html">Booking</a>
        <a href="payment.html">Payment</a>
    </nav>
</header>

<div class="container">
    <h2>Contact Us</h2>
    <form id="contactForm">
        <div class="input-container">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="Enter your full name" required>
            <small>Example: John Doe</small>
        </div>

        <div class="input-container">
            <i class="fas fa-phone"></i>
            <input type="text" id="phone" placeholder="Enter your phone number" required>
            <small>Example: +91 98765 43210</small>
        </div>

        <div class="input-container">
            <i class="fas fa-concierge-bell"></i>
            <select id="service" required>
                <option value="">Select a service</option>
                <option value="Tour Booking">Tour Booking</option>
                <option value="Hotel Inquiry">Hotel Inquiry</option>
                <option value="Other">Other</option>
            </select>
            <small>Choose the service you want help with</small>
        </div>

        <div class="input-container">
            <i class="fas fa-comment-dots"></i>
            <textarea id="message" placeholder="Write your message here..." required></textarea>
            <small>Explain your request or inquiry in detail</small>
        </div>

        <button type="submit">Submit</button>
    </form>

    <div class="success" id="successMsg">Your message has been sent successfully!</div>
    <div class="error" id="errorMsg">Error sending message. Please try again.</div>
</div>

<script>
const BASE_URL = window.location.hostname.includes("localhost") 
    ? "http://localhost:3000" 
    : "https://webs-1-aya0.onrender.com";

const form = document.getElementById("contactForm");
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const service = document.getElementById("service").value;
    const message = document.getElementById("message").value;

    try {
        const res = await fetch(`${BASE_URL}/contact`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, phone, service, message })
        });

        const data = await res.text();

        if (res.ok) {
            document.getElementById("successMsg").style.display = "block";
            document.getElementById("errorMsg").style.display = "none";
            form.reset();
        } else {
            document.getElementById("errorMsg").innerText = data;
            document.getElementById("errorMsg").style.display = "block";
            document.getElementById("successMsg").style.display = "none";
        }
    } catch (err) {
        console.error(err);
        document.getElementById("errorMsg").innerText = "Error connecting to server.";
        document.getElementById("errorMsg").style.display = "block";
    }
});
</script>

</body>
</html>
