<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Himachal Tourism - Contact</title>
</head>
<body>
  <h1>Contact Us</h1>
  <form id="contactForm">
    <input type="text" name="name" placeholder="Name" required />
    <input type="tel" name="phone" placeholder="Phone" required />
    <input type="text" name="service" placeholder="Service Required" required />
    <textarea name="message" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>

  <script>
    const BASE_URL = window.location.hostname.includes("localhost")
      ? "http://localhost:3000"
      : "https://webs-1-aya0.onrender.com";

    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = { name: form.name.value, phone: form.phone.value, service: form.service.value, message: form.message.value };
      try {
        const res = await fetch(`${BASE_URL}/contact`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        alert(await res.text());
        form.reset();
      } catch (err) {
        console.error(err);
        alert("Error sending message");
      }
    });
  </script>
</body>
</html>
