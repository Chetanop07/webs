<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sangla Valley - Travel Guide</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f4f7fb;
    color:#333;
}

.hero{
    height:60vh;
    background:url('images/sangla.jpg') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

.hero h1{
    position:relative;
    font-size:3rem;
}

.container{
    padding:40px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

button{
    background:#2a5d84;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Sangla Valley</h1>
</div>

<div class="container">

<div class="card">
<h2>🌿 About Sangla</h2>
<p>Beautiful valley in Kinnaur known for rivers, apple orchards, and wooden houses.</p>
</div>

<div class="card">
<h2>📍 Attractions</h2>
<ul>
<li>Baspa River</li>
<li>Kamru Fort</li>
<li>Chitkul nearby</li>
<li>Rakcham Village</li>
</ul>
</div>

<div class="card">
<h2>🌤️ Best Time</h2>
<p>April to October.</p>
</div>

<button onclick="history.back()">⬅ Back</button>

</div>

</body>
</html>
