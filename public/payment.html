<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Himachal Tourism - Payment</title>
</head>
<body>
  <h1>Payment</h1>
  <form id="paymentForm">
    <input type="text" name="name" placeholder="Name" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="text" name="destination" placeholder="Destination" required />
    <input type="number" name="amount" placeholder="Amount" required />
    <button type="submit">Pay</button>
  </form>

  <script>
    const BASE_URL = window.location.hostname.includes("localhost")
      ? "http://localhost:3000"
      : "https://webs-1-aya0.onrender.com";

    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = { name: form.name.value, email: form.email.value, destination: form.destination.value, amount: form.amount.value };
      try {
        const res = await fetch(`${BASE_URL}/payment`, { // you need to add /payment in your server
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        alert(await res.text());
        form.reset();
      } catch (err) {
        console.error(err);
        alert("Error processing payment");
      }
    });
  </script>
</body>
</html>
