<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Himachal Tourism - Admin</title>
</head>
<body>
  <h1>Admin Panel</h1>
  <button onclick="fetchUsers()">View Users</button>
  <button onclick="fetchBookings()">View Bookings</button>
  <button onclick="fetchContacts()">View Contacts</button>
  <button onclick="fetchReviews()">View Reviews</button>

  <pre id="output" style="background:#eee; padding:10px;"></pre>

  <script>
    const BASE_URL = window.location.hostname.includes("localhost")
      ? "http://localhost:3000"
      : "https://webs-1-aya0.onrender.com";

    async function fetchUsers() {
      const res = await fetch(`${BASE_URL}/admin/users`);
      document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }
    async function fetchBookings() {
      const res = await fetch(`${BASE_URL}/admin/bookings`);
      document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }
    async function fetchContacts() {
      const res = await fetch(`${BASE_URL}/admin/contacts`);
      document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }
    async function fetchReviews() {
      const res = await fetch(`${BASE_URL}/admin/reviews`);
      document.getElementById("output").innerText = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
